version: "3.9"

services:

  # ---------------- NGINX ----------------
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - tenant1
      - tenant2
      - tenant3
    restart: always

  # ---------------- MYSQL ----------------
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  # ---------------- TENANTS ----------------
  tenant1:
    image: wordpress:php8.2-apache
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: rootpass
      WORDPRESS_DB_NAME: tenant1_db
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://' . $$_SERVER['HTTP_HOST'] . '/tenant1');
        define('WP_SITEURL', 'http://' . $$_SERVER['HTTP_HOST'] . '/tenant1');
    volumes:
      - ./tenants/tenant1/wp-content:/var/www/html/wp-content
    restart: always

  tenant2:
    image: wordpress:php8.2-apache
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: rootpass
      WORDPRESS_DB_NAME: tenant2_db
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://' . $$_SERVER['HTTP_HOST'] . '/tenant2');
        define('WP_SITEURL', 'http://' . $$_SERVER['HTTP_HOST'] . '/tenant2');
    volumes:
      - ./tenants/tenant2/wp-content:/var/www/html/wp-content
    restart: always

  tenant3:
    image: wordpress:php8.2-apache
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: rootpass
      WORDPRESS_DB_NAME: tenant3_db
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://' . $$_SERVER['HTTP_HOST'] . '/tenant3');
        define('WP_SITEURL', 'http://' . $$_SERVER['HTTP_HOST'] . '/tenant3');
    volumes:
      - ./tenants/tenant3/wp-content:/var/www/html/wp-content
    restart: always

  # ---------------- PROMETHEUS ----------------
  prometheus:
    image: prom/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  # ---------------- NODE EXPORTER ----------------
  node-exporter:
    image: prom/node-exporter
    ports:
      - "9100:9100"
    restart: always

  # ---------------- CADVISOR ----------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: always

  # ---------------- LOKI ----------------
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    restart: always

  # ---------------- PROMTAIL ----------------
  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail.yml:/etc/promtail/config.yml
    restart: always

  # ---------------- GRAFANA ----------------
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: always

volumes:
  mysql_data:
