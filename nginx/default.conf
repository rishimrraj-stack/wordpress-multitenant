server {
    listen 80;

    location /tenant1/ {
        proxy_pass http://tenant1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /tenant2/ {
        proxy_pass http://tenant2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /tenant3/ {
        proxy_pass http://tenant3/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
