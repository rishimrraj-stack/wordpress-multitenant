name: Multi-Tenant CI/CD

on:
  pull_request:
  push:
    branches: [main]

jobs:

  # -------------------------
  # PR VALIDATION
  # -------------------------
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ PHP Syntax Check
      - name: PHP Lint
        run: find . -name "*.php" -exec php -l {} \;

      # ✅ Install PHPCS + WPCS
      - name: Install PHPCS
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require "squizlabs/php_codesniffer:^3.7"
          composer global require "wp-coding-standards/wpcs:^3.0"

      # ✅ WordPress Coding Standards
      - name: Run Coding Standards
        run: ~/.composer/vendor/bin/phpcs --standard=WordPress --runtime-set ignore_warnings_on_exit 1 .

      # 🔐 Security Check (Smart)
      - name: Security Check
        run: |
          if [ -f composer.json ]; then
            composer audit || true
          else
            echo "No composer.json found, skipping audit"
          fi

  # -------------------------
  # DETECT CHANGES
  # -------------------------
  detect-changes:
    runs-on: ubuntu-latest
    needs: quality-check
    outputs:
      tenant1: ${{ steps.filter.outputs.tenant1 }}
      tenant2: ${{ steps.filter.outputs.tenant2 }}
      tenant3: ${{ steps.filter.outputs.tenant3 }}

    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            tenant1:
              - 'wp-content/themes/tenant1-theme/**'
              - 'wp-content/plugins/tenant1-plugin/**'
            tenant2:
              - 'wp-content/themes/tenant2-theme/**'
              - 'wp-content/plugins/tenant2-plugin/**'
            tenant3:
              - 'wp-content/themes/tenant3-theme/**'
              - 'wp-content/plugins/tenant3-plugin/**'

  # -------------------------
  # BUILD + DEPLOY TENANT1
  # -------------------------
  tenant1:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.tenant1 == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Build Artifact
        run: |
          zip -r tenant1-${{ github.run_number }}.zip \
          wp-content/themes/tenant1-theme \
          wp-content/plugins/tenant1-plugin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenant1-build
          path: tenant1-*.zip

      - name: Simulate Deploy
        run: echo "Deploying Tenant1..."

  # -------------------------
  # BUILD + DEPLOY TENANT2
  # -------------------------
  tenant2:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.tenant2 == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Build Artifact
        run: |
          zip -r tenant2-${{ github.run_number }}.zip \
          wp-content/themes/tenant2-theme \
          wp-content/plugins/tenant2-plugin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenant2-build
          path: tenant2-*.zip

      - name: Simulate Deploy
        run: echo "Deploying Tenant2..."

  # -------------------------
  # BUILD + DEPLOY TENANT3
  # -------------------------
  tenant3:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.tenant3 == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Build Artifact
        run: |
          zip -r tenant3-${{ github.run_number }}.zip \
          wp-content/themes/tenant3-theme \
          wp-content/plugins/tenant3-plugin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenant3-build
          path: tenant3-*.zip

      - name: Simulate Deploy
        run: echo "Deploying Tenant3..."