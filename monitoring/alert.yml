groups:
  - name: wordpress-alerts
    rules:

      # 🔴 Availability Alert
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance is down"

      # 🟡 Latency Alert
      - alert: HighLatency
        expr: scrape_duration_seconds > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High scrape latency"

      # 🔵 Basic Health Alert
      - alert: WordPressDown
        expr: up{job="wordpress"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "WordPress instance down"
